<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>DocMind — ask your documents</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Source+Serif+4:opsz,wght@8..60,400;8..60,600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">

<style>
/* =========================================================================
   1. DESIGN TOKENS — change a colour here and it changes everywhere.
   ========================================================================= */
:root{
  --ink:        #0B0F2B;   /* page background */
  --panel:      #141A44;   /* cards */
  --panel-edge: #262E63;   /* borders */
  --paper:      #ECEAFB;   /* main text */
  --muted:      #8D93C4;   /* secondary text */
  --highlight:  #FFD166;   /* the highlighter-pen accent */
  --verified:   #63E6BE;   /* "checked against the document" green */
  --warn:       #FF8FA3;   /* not-in-document warning */

  --display: 'Space Grotesk', system-ui, sans-serif;
  --body:    'Source Serif 4', Georgia, serif;
  --mono:    'JetBrains Mono', monospace;

  --radius: 14px;
}

*{ box-sizing: border-box; }
html, body{ height: 100%; }

body{
  margin:0;
  background: var(--ink);
  color: var(--paper);
  font-family: var(--body);
  font-size: 17px;
  line-height: 1.6;
  overflow: hidden;          /* the panes scroll, not the page */
}

/* =========================================================================
   2. MOTION BACKGROUND
   Slow drifting blobs plus faint ruled-paper lines. Decorative only, so
   pointer-events off — it must never swallow a click.
   ========================================================================= */
.bg{ position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden; }

.blob{ position:absolute; border-radius:50%; filter: blur(90px); opacity:.40; }
.blob.one   { width:46vw; height:46vw; background:#3A2E8F; top:-12vw; left:-8vw;   animation: drift1 26s ease-in-out infinite; }
.blob.two   { width:38vw; height:38vw; background:#0E5C6B; bottom:-14vw; right:-6vw; animation: drift2 32s ease-in-out infinite; }
.blob.three { width:30vw; height:30vw; background:#7A4E1E; top:38%; left:52%;       animation: drift3 38s ease-in-out infinite; }

@keyframes drift1{ 50%{ transform: translate(9vw, 7vh) scale(1.12); } }
@keyframes drift2{ 50%{ transform: translate(-8vw, -6vh) scale(1.08); } }
@keyframes drift3{ 50%{ transform: translate(-6vw, 8vh) scale(.9); } }

.rules{
  position:absolute; inset:-50% 0;
  background: repeating-linear-gradient(to bottom, rgba(236,234,251,.045) 0 1px, transparent 1px 34px);
  animation: scrollRules 40s linear infinite;
}
@keyframes scrollRules{ to{ transform: translateY(34px); } }

@media (prefers-reduced-motion: reduce){
  .blob, .rules, .a, .hero{ animation: none !important; }
}

/* =========================================================================
   3. TWO STATES
   .stage-empty   nothing uploaded  -> centered hero, input is the whole page
   .stage-working files uploaded    -> preview left, conversation right
   ========================================================================= */
.stage{ position: relative; z-index: 1; height: 100%; }

body.working #hero{ display: none; }
body:not(.working) #work{ display: none; }

/* ---------- 3a. THE HERO ---------- */
#hero{
  height: 100%;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 24px;
  text-align: center;
  animation: hero .5s ease-out both;
}
@keyframes hero{ from{ opacity:0; transform: translateY(12px); } }

.mark{
  font-family: var(--mono);
  font-size: 12px; letter-spacing:.18em; text-transform: uppercase;
  color: var(--highlight);
  margin-bottom: 18px;
}

h1{
  font-family: var(--display);
  font-weight: 700;
  font-size: clamp(32px, 6vw, 60px);
  line-height: 1.05;
  margin: 0 0 16px;
  max-width: 16ch;
}
/* The signature: a highlighter stroke, as if someone marked up the page. */
h1 em{
  font-style: normal;
  background: linear-gradient(transparent 60%, rgba(255,209,102,.42) 60%);
  padding: 0 6px;
}

.sub{ color: var(--muted); max-width: 46ch; margin: 0 0 38px; }

/* The composer: one box holding the attach button and the question field. */
.composer{
  width: 100%; max-width: 680px;
  background: rgba(20,26,68,.80);
  border: 1px solid var(--panel-edge);
  border-radius: 18px;
  padding: 14px;
  backdrop-filter: blur(10px);
  transition: border-color .2s, background .2s;
}
.composer.over{ border-color: var(--highlight); background: rgba(255,209,102,.07); }

.composer-row{ display:flex; gap: 10px; align-items: center; }

.attach{
  width: 42px; height: 42px; flex-shrink: 0;
  border-radius: 11px;
  border: 1px solid var(--panel-edge);
  background: rgba(11,15,43,.6);
  color: var(--paper);
  font-size: 18px; line-height: 1;
  cursor: pointer;
  display:flex; align-items:center; justify-content:center;
  transition: border-color .2s, color .2s;
}
.attach:hover{ border-color: var(--highlight); color: var(--highlight); }

.hint{
  font-family: var(--mono);
  font-size: 11px; letter-spacing:.1em; text-transform: uppercase;
  color: var(--muted);
  margin-top: 12px;
}

/* ---------- 3b. THE WORKING LAYOUT ---------- */
#work{
  height: 100%;
  display: grid;
  grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
  gap: 18px;
  padding: 18px;
}
@media (max-width: 980px){
  #work{ grid-template-columns: 1fr; grid-template-rows: 40vh 1fr; }
}

.pane{
  min-height: 0;                       /* lets children scroll inside a grid */
  display: flex; flex-direction: column;
  background: rgba(20,26,68,.72);
  border: 1px solid var(--panel-edge);
  border-radius: var(--radius);
  backdrop-filter: blur(10px);
  overflow: hidden;
}

/* ---------- 4. THE FILE TAB BAR ---------- */
.tabs{
  display: flex; gap: 8px;
  padding: 10px;
  border-bottom: 1px solid var(--panel-edge);
  overflow-x: auto;
  flex-shrink: 0;
  scrollbar-width: thin;
}

.tab{
  display: flex; align-items: center; gap: 8px;
  padding: 7px 10px;
  border-radius: 10px;
  border: 1px solid var(--panel-edge);
  background: rgba(11,15,43,.5);
  cursor: pointer;
  white-space: nowrap;
  flex-shrink: 0;
  transition: border-color .2s, background .2s, opacity .2s;
}
.tab:hover{ border-color: var(--muted); }
.tab.active{ border-color: var(--highlight); background: rgba(255,209,102,.09); }
/* Unticked files fade back, so what's being searched is obvious at a glance. */
.tab.excluded{ opacity: .40; }

.tab input[type=checkbox]{ accent-color: var(--highlight); cursor: pointer; margin:0; }
.tab .name{
  font-family: var(--display);
  font-size: 13px;
  max-width: 170px;
  overflow: hidden; text-overflow: ellipsis;
}
/* Pulsing dot on a tab whose file is still being read. */
.tab .working{
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--highlight);
  animation: pulse 1.1s ease-in-out infinite;
  flex-shrink: 0;
}
@keyframes pulse{ 50%{ opacity: .25; } }

.tab .kill{
  border:none; background:none; color: var(--muted);
  font-size: 15px; line-height:1; padding:0 1px; cursor:pointer;
}
.tab .kill:hover{ color: var(--warn); }

.addfile{
  border: 1px dashed var(--panel-edge);
  background: none;
  color: var(--muted);
  border-radius: 10px;
  padding: 7px 12px;
  font-family: var(--display); font-size: 13px;
  cursor: pointer; flex-shrink: 0;
}
.addfile:hover{ border-color: var(--highlight); color: var(--highlight); }

/* ---------- 5. THE PREVIEW PANE ---------- */
.preview{ flex: 1; min-height: 0; position: relative; background: rgba(11,15,43,.35); }
.preview iframe{ width: 100%; height: 100%; border: 0; display: block; }

/* Word files can't render natively, so we show their text instead. */
.textview{ height: 100%; overflow-y: auto; padding: 22px 24px; }
.textview .pagemark{
  font-family: var(--mono);
  font-size: 10px; letter-spacing:.14em; text-transform: uppercase;
  color: var(--highlight);
  margin: 22px 0 8px;
  padding-bottom: 5px;
  border-bottom: 1px solid var(--panel-edge);
}
.textview .pagemark:first-child{ margin-top: 0; }
.textview p{ margin: 0 0 12px; font-size: 15px; }

.previewEmpty{
  height:100%; display:flex; align-items:center; justify-content:center;
  color: var(--muted); font-size: 15px; text-align:center; padding: 30px;
}

/* ---------- 6. THE CONVERSATION PANE ---------- */
.thread{
  flex: 1; min-height: 0;
  overflow-y: auto;
  padding: 22px;
  display: flex; flex-direction: column; gap: 22px;
}

.empty{
  margin: auto;
  color: var(--muted); font-size: 15px; text-align: center; max-width: 34ch;
}

.q{
  font-family: var(--display);
  font-weight: 500;
  font-size: 19px; line-height: 1.35;
  padding-left: 15px;
  border-left: 3px solid var(--highlight);
}
.q .qtag{
  display:block;
  font-family: var(--mono);
  font-size: 10px; letter-spacing:.16em; text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 5px;
}

.a{
  background: rgba(11,15,43,.5);
  border: 1px solid var(--panel-edge);
  border-radius: var(--radius);
  padding: 20px;
  animation: rise .35s ease-out both;
}
@keyframes rise{ from{ opacity:0; transform: translateY(8px); } }

.badge{
  display:inline-flex; align-items:center; gap:7px;
  font-family: var(--mono);
  font-size: 11px; letter-spacing:.1em; text-transform: uppercase;
  padding: 5px 11px; border-radius: 999px; margin-bottom: 12px;
}
.badge.document{ background: rgba(99,230,190,.13); color: var(--verified); border:1px solid rgba(99,230,190,.3); }
.badge.partial { background: rgba(255,209,102,.13); color: var(--highlight); border:1px solid rgba(255,209,102,.3); }
.badge.general { background: rgba(255,143,163,.13); color: var(--warn);      border:1px solid rgba(255,143,163,.3); }
.dot{ width:7px; height:7px; border-radius:50%; background: currentColor; }

/* Shown when a follow-up was rewritten before searching. */
.rewritten{
  font-family: var(--mono);
  font-size: 11px; color: var(--muted);
  margin-bottom: 12px; padding-left: 11px;
  border-left: 2px solid var(--panel-edge);
}
.rewritten b{ color: var(--highlight); font-weight: 400; }

.answer p{ margin: 0 0 12px; }

.explain{
  margin-top: 16px; padding: 15px 17px;
  border-radius: 11px;
  background: rgba(255,255,255,.035);
  border-left: 2px solid var(--panel-edge);
  font-size: 16px;
}
.label{
  font-family: var(--mono);
  font-size: 11px; letter-spacing:.14em; text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 8px;
}

.missing{ margin-top: 14px; font-size: 15px; color: var(--warn); }

/* Evidence slips — the verified quotes, styled like highlighted paper. */
.slips{ margin-top: 10px; display:flex; flex-direction:column; gap:10px; }
.slip{
  background: rgba(255,209,102,.07);
  border-left: 3px solid var(--highlight);
  border-radius: 0 9px 9px 0;
  padding: 11px 14px; font-size: 15px;
}
.slip .page{
  font-family: var(--mono);
  font-size: 10px; letter-spacing:.12em; text-transform: uppercase;
  color: var(--highlight);
  display:block; margin-bottom: 5px;
  cursor: pointer;
}
.slip .page[data-doc]{ cursor: pointer; }
.slip .page[data-doc]:hover{ text-decoration: underline; }
.slip .page:not([data-doc]){ cursor: default; }

.raw .jump{ cursor: pointer; color: var(--highlight); }
.raw .jump:hover{ text-decoration: underline; }

details{ margin-top: 16px; }
summary{
  cursor: pointer;
  font-family: var(--mono);
  font-size: 11px; letter-spacing:.12em; text-transform: uppercase;
  color: var(--muted);
}
summary:hover{ color: var(--paper); }
.raw{
  margin-top: 10px; font-size: 14px; color: var(--muted);
  border-top: 1px solid var(--panel-edge); padding-top: 10px;
}

/* ---------- 7. THE DOCKED ASK BAR ---------- */
.askbar{
  flex-shrink: 0;
  display:flex; gap: 10px;
  padding: 14px;
  border-top: 1px solid var(--panel-edge);
  background: rgba(11,15,43,.45);
}

input[type=text]{
  flex:1; min-width: 0;
  background: rgba(11,15,43,.7);
  border: 1px solid var(--panel-edge);
  border-radius: 11px;
  padding: 13px 15px;
  color: var(--paper);
  font-family: var(--body); font-size: 16px;
}
input[type=text]::placeholder{ color:#6C72A4; }
input[type=text]:focus, button:focus-visible, .tab:focus-visible{
  outline: 2px solid var(--highlight);
  outline-offset: 2px;
}

button.go{
  font-family: var(--display); font-weight:500; font-size:15px;
  background: var(--highlight); color:#241A00;
  border:none; border-radius: 11px;
  padding: 0 22px; cursor:pointer;
  transition: transform .12s, opacity .2s;
}
button.go:hover:not(:disabled){ transform: translateY(-1px); }
button.go:disabled{ opacity:.45; cursor:not-allowed; }

.thinking{
  font-family: var(--mono);
  font-size: 12px; letter-spacing:.1em; text-transform: uppercase;
  color: var(--muted);
}
.thinking::after{ content:''; animation: dots 1.2s steps(4,end) infinite; }
@keyframes dots{ 0%{content:''} 25%{content:'.'} 50%{content:'..'} 75%{content:'...'} }

.notice{
  padding: 10px 14px; margin: 0 14px 12px;
  border-radius: 10px;
  background: rgba(255,143,163,.1);
  border: 1px solid rgba(255,143,163,.3);
  color: var(--warn);
  font-size: 14px;
  display: none;
}
.notice.show{ display:block; }

#file{ display:none; }
</style>
</head>

<body>

<div class="bg" aria-hidden="true">
  <div class="rules"></div>
  <div class="blob one"></div><div class="blob two"></div><div class="blob three"></div>
</div>

<input type="file" id="file" accept=".pdf,.docx" multiple>

<div class="stage">

  <!-- ============================================================
       STATE 1 — nothing uploaded yet. The composer is the whole page.
       ============================================================ -->
  <section id="hero">
    <div class="mark">Document Q&amp;A</div>
    <h1>What are we <em>reading</em> today?</h1>
    <p class="sub">Drop in a PDF or Word file and ask about it. Every answer comes
       back with the exact lines it was built from.</p>

    <div class="composer" id="composer">
      <div class="composer-row">
        <button class="attach" id="heroAttach" title="Add a file">+</button>
        <input type="text" id="heroInput" placeholder="Add a file to start asking…" disabled>
        <button class="go" id="heroGo" disabled>Ask</button>
      </div>
    </div>
    <div class="hint">PDF or .docx · up to 25MB each</div>
    <div class="notice" id="heroNotice" style="margin-top:16px"></div>
  </section>

  <!-- ============================================================
       STATE 2 — files loaded. Preview on the left, conversation right.
       ============================================================ -->
  <main id="work">

    <!-- LEFT: the file tabs and the preview -->
    <section class="pane">
      <div class="tabs" id="tabs"></div>
      <div class="preview" id="preview">
        <div class="previewEmpty">Select a file above to read it here.</div>
      </div>
    </section>

    <!-- RIGHT: the conversation and the ask bar -->
    <section class="pane">
      <div class="thread" id="thread">
        <div class="empty" id="empty">Ask anything about the ticked files.
          Untick one to leave it out.</div>
      </div>
      <div class="notice" id="notice"></div>
      <div class="askbar">
        <input type="text" id="question" placeholder="Ask across your files…">
        <button class="go" id="send">Ask</button>
      </div>
    </section>

  </main>
</div>

<script>
/* =========================================================================
   STATE
   files[]   every uploaded file. "on" = ticked, so included in searches.
             "url" is a browser-local link to the PDF, used by the preview.
   history[] the conversation, sent with each question so follow-ups like
             "how is it trained?" can be understood.
   ========================================================================= */
let files = [];
let history = [];
let previewing = null;   // uid of the file currently shown in the preview pane
let nextUid = 1;         // local id, assigned the moment a file is picked, so
                         // the preview can open before the server has replied

const el = id => document.getElementById(id);
const fileInput = el('file'), thread = el('thread');

/* ---------- 1. PICKING FILES ---------- */

el('heroAttach').addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', () => {
  uploadMany(fileInput.files);
  fileInput.value = '';       // lets you re-pick the same file later
});

// Drag and drop anywhere on the composer.
const composer = el('composer');
['dragenter','dragover'].forEach(e =>
  composer.addEventListener(e, ev => { ev.preventDefault(); composer.classList.add('over'); }));
['dragleave','drop'].forEach(e =>
  composer.addEventListener(e, ev => { ev.preventDefault(); composer.classList.remove('over'); }));
composer.addEventListener('drop', ev => uploadMany(ev.dataTransfer.files));

async function uploadMany(list){
  // One at a time on purpose: embedding is CPU-heavy, and parallel uploads
  // would just fight each other for the same cores.
  for (const f of list) await upload(f);
}

async function upload(file){
  showNotice('');

  const row = {
    uid: nextUid++,
    doc_id: null,
    filename: file.name,
    stats: 'Reading…',
    ready: false,
    on: true,
    isPdf: file.name.toLowerCase().endsWith('.pdf'),
    // Browsers can display a PDF straight from memory. This link is local to
    // the tab — the file is never re-downloaded from the server.
    url: file.name.toLowerCase().endsWith('.pdf') ? URL.createObjectURL(file) : null,
  };
  files.push(row);
  goWorking();
  drawTabs();
  updateAskState();

  // A PDF can be displayed straight away - the browser already has the bytes.
  // Waiting for the server would leave the preview blank for minutes on a
  // large file, which looks broken.
  if(!previewing) showPreview(row.uid);

  const form = new FormData();
  form.append('file', file);

  try{
    const res = await fetch('/upload', { method:'POST', body: form });
    const data = await res.json();

    if(!res.ok){
      files = files.filter(f => f !== row);
      drawTabs();
      if(!files.length) goEmpty();
      showNotice(`${file.name} — ${data.detail || 'could not be read'}`);
      return;
    }

    row.doc_id = data.doc_id;
    row.stats  = `${data.pages} pages · ${data.chunks} sections`
               + (data.cached ? ' · from cache' : '');
    row.ready  = true;
    drawTabs();
    updateAskState();

    // A Word file's text preview only becomes possible now.
    if(previewing === row.uid && !row.isPdf) showPreview(row.uid);

  }catch(err){
    files = files.filter(f => f !== row);
    drawTabs();
    if(!files.length) goEmpty();
    showNotice('Could not reach the server. Is it still running?');
  }
}

/* ---------- 2. SWITCHING BETWEEN THE TWO LAYOUTS ---------- */

function goWorking(){
  document.body.classList.add('working');
  el('question').focus();
}
function goEmpty(){
  document.body.classList.remove('working');
  previewing = null;
}

/* ---------- 3. THE FILE TAB BAR ---------- */

function drawTabs(){
  const bar = el('tabs');
  bar.innerHTML = '';

  files.forEach((f, index) => {
    const tab = document.createElement('div');
    tab.className = 'tab'
      + (f.uid === previewing ? ' active' : '')
      + (f.on ? '' : ' excluded');
    tab.tabIndex = 0;

    tab.innerHTML = `
      <input type="checkbox" ${f.on ? 'checked' : ''} ${f.doc_id ? '' : 'disabled'}
             title="Include this file in answers">
      <span class="name" title="${escapeHtml(f.stats)}">${escapeHtml(f.filename)}</span>
      ${f.ready ? '' : '<span class="working" title="Still reading"></span>'}
      <button class="kill" title="Remove">&times;</button>`;

    // The checkbox decides whether the file is SEARCHED.
    tab.querySelector('input').addEventListener('click', e => {
      e.stopPropagation();
      f.on = e.target.checked;
      drawTabs();
      updateAskState();
    });

    // Clicking the tab itself decides which file is SHOWN.
    tab.addEventListener('click', () => showPreview(f.uid));
    tab.addEventListener('keydown', e => {
      if(e.key === 'Enter') showPreview(f.uid);
    });

    tab.querySelector('.kill').addEventListener('click', e => {
      e.stopPropagation();
      if(f.doc_id) fetch(`/document/${f.doc_id}`, { method:'DELETE' });
      if(f.url) URL.revokeObjectURL(f.url);      // free the browser's copy
      files.splice(index, 1);

      if(previewing === f.uid){
        previewing = null;
        files.length ? showPreview(files[0].uid) : clearPreview();
      }
      drawTabs();
      updateAskState();
      if(!files.length) goEmpty();
    });

    bar.appendChild(tab);
  });

  const add = document.createElement('button');
  add.className = 'addfile';
  add.textContent = '+ Add file';
  add.addEventListener('click', () => fileInput.click());
  bar.appendChild(add);
}

/* ---------- 4. THE PREVIEW PANE ---------- */

async function showPreview(uid, page){
  // uid may arrive as a string when it comes from an HTML attribute, so force
  // it to a number. Comparing "3" === 3 is false, and the mismatch used to
  // blank the preview instead of switching to the file.
  uid = Number(uid);

  previewing = uid;
  drawTabs();

  const f = files.find(x => x.uid === uid);
  const pane = el('preview');
  if(!f) return clearPreview();

  // PDFs: the browser has a built-in viewer, and it understands #page=N, so
  // a citation can drop you straight on the right page.
  if(f.isPdf && f.url){
    const jump = page ? `#page=${page}&view=FitH` : '#view=FitH';
    pane.innerHTML = `<iframe src="${f.url}${jump}" title="${escapeHtml(f.filename)}"></iframe>`;
    return;
  }

  // Word files: nothing to render, so show the text the server extracted.
  // Same page numbers the citations use, so they line up.
  if(!f.doc_id){
    pane.innerHTML = `<div class="previewEmpty">Reading this Word file…<br>
      Text preview appears once it's processed.</div>`;
    return;
  }

  pane.innerHTML = `<div class="previewEmpty">Loading text…</div>`;
  try{
    const res = await fetch(`/document/${f.doc_id}/text`);
    const data = await res.json();
    if(!res.ok) throw new Error();

    let html = '<div class="textview">';
    data.pages.forEach(p => {
      html += `<div class="pagemark" data-page="${p.page}">Page ${p.page}</div>`;
      p.text.split(/\n+/).filter(Boolean).forEach(line => {
        html += `<p>${escapeHtml(line)}</p>`;
      });
    });
    pane.innerHTML = html + '</div>';

    // Word files have no page fragments, so scroll to the marker ourselves.
    if(page){
      const marker = pane.querySelector(`[data-page="${page}"]`);
      if(marker) marker.scrollIntoView({ behavior:'smooth', block:'start' });
    }

  }catch(err){
    pane.innerHTML = `<div class="previewEmpty">Couldn't load the text for this file.</div>`;
  }
}

function clearPreview(){
  previewing = null;
  el('preview').innerHTML = `<div class="previewEmpty">Select a file above to read it here.</div>`;
}

/* ---------- 5. ASKING ---------- */

el('send').addEventListener('click', ask);
el('question').addEventListener('keydown', e => { if(e.key === 'Enter') ask(); });
el('heroGo').addEventListener('click', ask);
el('heroInput').addEventListener('keydown', e => { if(e.key === 'Enter') ask(); });

function selectedIds(){
  return files.filter(f => f.on && f.doc_id).map(f => f.doc_id);
}

function updateAskState(){
  const n = selectedIds().length;
  const loading = files.some(f => !f.ready);
  const box = el('question');

  box.disabled = n === 0;
  el('send').disabled = n === 0;

  // Three different situations, three different messages. "Tick a file" while
  // a file is clearly still loading is just confusing.
  if(n) {
    box.placeholder = loading
      ? `Ask across ${n} file${n > 1 ? 's' : ''}… (still reading the rest)`
      : `Ask across ${n} file${n > 1 ? 's' : ''}…`;
  } else if(loading) {
    box.placeholder = 'Still reading your file — large ones take a few minutes…';
  } else {
    box.placeholder = 'Tick a file to ask about it…';
  }
}

async function ask(){
  const box = el('question');
  const question = box.value.trim();
  const ids = selectedIds();
  if(!question || !ids.length) return;

  box.value = '';
  el('send').disabled = true;
  el('empty')?.remove();

  addQuestion(question);
  const pending = addThinking();

  try{
    const res = await fetch('/ask', {
      method:'POST',
      headers:{ 'Content-Type':'application/json' },
      body: JSON.stringify({ doc_ids: ids, question, history })
    });
    const data = await res.json();
    pending.remove();

    if(!res.ok){
      addError(data.detail || 'Something went wrong.');
    } else {
      addAnswer(data);
      // Keep only the last few turns: older context stops being relevant and
      // just makes every request bigger and slower.
      history.push({ question, answer: data.answer || '' });
      if(history.length > 6) history = history.slice(-6);
    }
  }catch(err){
    pending.remove();
    addError('Could not reach the server.');
  }

  updateAskState();
  box.focus();
}

/* ---------- 6. DRAWING THE CONVERSATION ---------- */

function addQuestion(text){
  const node = document.createElement('div');
  node.className = 'q';
  node.innerHTML = `<span class="qtag">You asked</span>${escapeHtml(text)}`;
  thread.appendChild(node);
  scrollDown();
}

function addThinking(){
  const node = document.createElement('div');
  node.className = 'thinking';
  node.textContent = 'Reading your files';
  thread.appendChild(node);
  scrollDown();
  return node;
}

function addError(message){
  const node = document.createElement('div');
  node.className = 'a';
  node.innerHTML = `<div class="badge general"><span class="dot"></span>Error</div>
                    <div class="answer">${escapeHtml(message)}</div>`;
  thread.appendChild(node);
  scrollDown();
}

function addAnswer(data){
  const labels = {
    document: 'From your files',
    partial:  'Partly in your files',
    general:  'Not in your files — general knowledge'
  };
  const source = labels[data.source] ? data.source : 'general';

  const node = document.createElement('div');
  node.className = 'a';

  let html = `<div class="badge ${source}"><span class="dot"></span>${labels[source]}</div>`;

  // If this was a follow-up, show what was actually searched. Otherwise it
  // looks like magic — and when a rewrite goes wrong, you can see why.
  if(data.searched_as){
    html += `<div class="rewritten">Understood as: <b>${escapeHtml(data.searched_as)}</b></div>`;
  }

  html += `<div class="answer">${paragraphs(data.answer)}</div>`;

  if(data.explain){
    html += `<div class="explain"><div class="label">In simple terms</div>${paragraphs(data.explain)}</div>`;
  }
  if(data.missing){
    html += `<div class="missing">Not covered by your files: ${escapeHtml(data.missing)}</div>`;
  }

  // The evidence slips — only quotes that passed the check in llm.py.
  if(data.quotes?.length){
    html += `<div class="label" style="margin-top:20px">Verified lines</div><div class="slips">`;
    data.quotes.forEach((quote, i) => {
      const src = (data.sources && data.sources[i]) || {};
      const tag = src.filename ? `${src.filename} · page ${src.page}` : 'In your files';
      // data-doc lets you click a citation to open that file in the preview.
      const docId = fileIdByName(src.filename);
      // data-doc + data-page let a citation open that file AT that page.
      const clickable = docId ? ` data-doc="${docId}" data-page="${src.page || ''}"` : '';
      html += `<div class="slip">
                 <span class="page"${clickable} title="${docId ? 'Open this page' : ''}">${escapeHtml(tag)}</span>
                 ${escapeHtml(quote)}
               </div>`;
    });
    html += `</div>`;
  }

  if(data.evidence?.length){
    html += `<details><summary>Show the sections searched (${data.evidence.length})</summary>`;
    data.evidence.forEach(ev => {
      const where = ev.filename ? `${ev.filename} · page ${ev.page}` : `Page ${ev.page}`;
      const eid = fileIdByName(ev.filename);
      const link = eid ? ` class="jump" data-doc="${eid}" data-page="${ev.page}"` : '';
      html += `<div class="raw"><strong${link}>${escapeHtml(where)}</strong> · match ${ev.score}<br>${escapeHtml(ev.text)}…</div>`;
    });
    html += `</details>`;
  }

  node.innerHTML = html;

  // Clicking a citation jumps the preview to that file.
  node.querySelectorAll('.jump[data-doc]').forEach(tag => {
    tag.addEventListener('click', () =>
      showPreview(tag.getAttribute('data-doc'), tag.getAttribute('data-page')));
  });

  node.querySelectorAll('.page[data-doc]').forEach(tag => {
    const id = tag.getAttribute('data-doc');
    const page = tag.getAttribute('data-page');
    if(id) tag.addEventListener('click', () => showPreview(id, page));
  });

  thread.appendChild(node);
  scrollDown();
}

/* ---------- helpers ---------- */

function fileIdByName(name){
  const f = files.find(x => x.filename === name);
  return f ? f.uid : null;
}

function scrollDown(){
  thread.scrollTop = thread.scrollHeight;
}

function escapeHtml(text){
  const d = document.createElement('div');
  d.textContent = text ?? '';
  return d.innerHTML;
}

function paragraphs(text){
  return (text || '').split(/\n+/).filter(Boolean)
    .map(line => `<p>${escapeHtml(line)}</p>`).join('');
}

function showNotice(message){
  // Show the message on whichever screen the user is currently looking at.
  const target = document.body.classList.contains('working') ? el('notice') : el('heroNotice');
  target.textContent = message;
  target.classList.toggle('show', !!message);
}

updateAskState();
</script>
</body>
</html>
